<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>A Pear Backend</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        #title { font-size: 3em; margin-top: 20px; z-index: 10; }
        .falling { position: absolute; top: -50px; font-size: 30px; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }
        .card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; width: 300px; text-align: center; z-index: 5; margin-top: 50px; }
        input, select { width: 90%; padding: 10px; margin: 5px; border-radius: 10px; border: none; }
    </style>
</head>
<body>
    <div id="title">A Pear Backend</div>
    <div id="pears"></div>
    <div class="card" id="form-box">
        <select id="urun">
            <option value="Uçak Büyük">Uçak Büyük - 50 TL</option>
            <option value="Uçak">Uçak - 40 TL</option>
            <option value="Fidget">Star Spiral Fidget - 30 TL</option>
            <option value="Özel">Özel</option>
        </select>
        <input type="text" id="isim" placeholder="İsim Soyisim">
        <div id="ozel-alan" style="display:none;"><input type="text" id="ozel" placeholder="Özel isteğin..."></div>
        <label><input type="checkbox" id="kabul"> Şartları kabul ediyorum.</label>
        <button onclick="odemeyeGec()">Devam Et</button>
    </div>

    <script>
        // Armut animasyonu
        for(let i=0; i<15; i++) {
            let p = document.createElement('div');
            p.className = 'falling';
            p.innerHTML = '🍐';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.getElementById('pears').appendChild(p);
        }

        function odemeyeGec() {
            document.getElementById('form-box').innerHTML = `
                <h3>Ödeme Bilgileri</h3>
                <input type="text" id="kart" placeholder="Kart No (16 Hane)" maxlength="16" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                <input type="text" id="tarih" placeholder="Tarih (AA/YY)" maxlength="5">
                <input type="text" id="cvc" placeholder="CVC (3 Hane)" maxlength="3" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                <button onclick="bitir()">Google 1 Ödeme Yap</button>
            `;
        }

        async function bitir() {
            // Sunucuya gönderim
            const data = { isim: document.getElementById('isim').value };
            await fetch('/siparis', { method: 'POST', body: JSON.stringify(data), headers: {'Content-Type': 'application/json'} });
            document.body.innerHTML = `<h1 style="color:blue">İşleminiz Onaylandı! ✅</h1>`;
        }
    </script>
</body>
</html>
